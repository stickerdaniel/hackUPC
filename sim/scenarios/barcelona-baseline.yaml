run:
  scenario: barcelona
  profile: baseline
  seed: 42
  horizon_ticks: 260   # 5 years × 52 weeks
  dt_seconds: 604800   # 1 week

environment:
  base_ambient_C: 22.0
  amplitude_C: 8.0
  weekly_runtime_hours: 60
  vibration_level: 0.10

drivers:
  temperature_stress:
    kind: sinusoidal_seasonal
    base: 0.30
    amplitude: 0.10
    period_weeks: 52
  humidity_contamination:
    kind: ornstein_uhlenbeck
    mean: 0.35
    theta: 0.05
    sigma: 0.04
  operational_load:
    kind: monotonic_duty_cycle
    base: 0.55
    monotonic_drift_per_year: 0.02
    duty_cycle_amplitude: 0.10
  maintenance_level:
    kind: step
    schedule:
      - tick: 0
        value: 0.7

chaos:
  enabled: false

policy:
  kind: heuristic

historian:
  path: data/historian.sqlite
