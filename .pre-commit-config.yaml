# .pre-commit-config.yaml
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^web/src/(env\.d\.ts|lib/convex/convex-env\.d\.ts)$
      - id: end-of-file-fixer
        exclude: ^web/src/(env\.d\.ts|lib/convex/convex-env\.d\.ts)$
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        exclude: ^assets/
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
        files: ^sim/
      - id: ruff-format
        files: ^sim/

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: bash -c 'cd sim && uv run ty check'
        language: system
        types: [python]
        files: ^sim/
        pass_filenames: false

      - id: web-varlock-scan
        name: varlock scan (web)
        entry: bash -c 'cd web && bunx varlock scan --staged'
        language: system
        files: ^web/
        pass_filenames: false

      - id: web-static-checks
        name: static-checks (web)
        entry: bash -c 'cd web && bun run static-checks:staged'
        language: system
        files: ^web/
        pass_filenames: false
